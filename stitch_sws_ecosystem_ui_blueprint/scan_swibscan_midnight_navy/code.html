<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .scanner-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #ffb2bf;
            box-shadow: 0 0 10px #ffb2bf, 0 0 20px #ffb2bf;
            animation: scan 2s linear infinite;
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .reticle-corner {
            width: 20px;
            height: 20px;
            border-color: #ffb2bf;
            border-style: solid;
            position: absolute;
        }
        .corner-tl { border-width: 2px 0 0 2px; top: -2px; left: -2px; }
        .corner-tr { border-width: 2px 2px 0 0; top: -2px; right: -2px; }
        .corner-bl { border-width: 0 0 2px 2px; bottom: -2px; left: -2px; }
        .corner-br { border-width: 0 2px 2px 0; bottom: -2px; right: -2px; }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
